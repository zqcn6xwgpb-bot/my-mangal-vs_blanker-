<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мангал та Заготівельний - Баранчик</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            storageBucket: "baranchik-checklist.firebasestorage.app",
            messagingSenderId: "374378353806",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fRef = ref;
        window.fSet = set;
        window.fOnValue = onValue;
        window.fPush = push;
        window.fRemove = remove;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --border: #252530;
            --accent: #f97316;
            --text: #e8e8f0;
            --text-dim: #5a5a70;
            --text-muted: #35354a;
            --green: #22c55e;
            --red: #ef4444;
            --header-bg: rgba(10,10,15,0.9);
        }

        body.light {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --border: #e2e8f0;
            --accent: #ea580c;
            --text: #0f172a;
            --text-dim: #64748b;
            --text-muted: #94a3b8;
            --header-bg: rgba(255,255,255,0.92);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s; }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .auth-title { font-size: 20px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 25px; text-align: center; }
        #auth-pin { width: 270px; background: var(--surface); border: 1.5px solid var(--border); color: var(--text); text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 32px; padding: 20px; border-radius: 20px; outline: none; margin-bottom: 15px; }

        header { background: var(--header-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 20px; position: relative; z-index: 40; }
        .header-inner { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .logo-mark { font-size: 16px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; font-style: italic; }
        
        main { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        @media (max-width: 650px) { .controls-grid { grid-template-columns: 1fr; } }

        .control-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; }
        .control-row { display: flex; gap: 8px; }
        select, input[type="text"] { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Syne', sans-serif; font-size: 12px; padding: 10px; border-radius: 12px; outline: none; flex: 1; }
        .ctrl-btn { background: var(--accent); color: white; font-weight: 800; padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; }

        .category-block { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; margin-bottom: 20px; }
        .cat-header { display: flex; justify-content: space-between; padding: 12px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); }
        .cat-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; }

        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; table-layout: fixed; }
        th { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--text-muted); padding: 12px 5px; text-transform: uppercase; text-align: center; }
        
        th:nth-child(1), td:nth-child(1) { width: 25%; text-align: left; padding-left: 20px; } 
        th:nth-child(2), td:nth-child(2) { width: 13%; } 
        th:nth-child(3), td:nth-child(3) { width: 13%; } 
        th:nth-child(4), td:nth-child(4) { width: 11%; } 
        th:nth-child(5), td:nth-child(5) { width: 11%; } 
        th:nth-child(6), td:nth-child(6) { width: 15%; } 

        td { padding: 8px 5px; vertical-align: middle; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .item-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; }
        
        input[type="number"] { width: 100%; padding: 10px 2px; text-align: center; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; border: 1px solid transparent; outline: none; transition: 0.2s; }
        .inp-stock { background: rgba(249,115,22,0.08); border-color: rgba(249,115,22,0.2); color: var(--accent); }
        .inp-norm { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
        .inp-readonly { opacity: 0.3; pointer-events: none; }
        
        .need-badge { background: rgba(239, 68, 68, 0.15); color: var(--red); padding: 8px; border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 800; display: block; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2); }
        .done-mark { color: var(--green); opacity: 0.2; font-size: 10px; text-align: center; }

        .hbtn { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; background: var(--surface2); color: var(--text-dim); }
        .theme-btn { font-size: 14px; padding: 8px 12px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(8px); }
        .modal-box { background: var(--surface); padding: 30px; border-radius: 30px; text-align: center; width: 300px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="font-size: 40px; margin-bottom: 10px;">🥩</div> <div class="auth-title">Мангал та Заготівельний</div>
    <input type="password" id="auth-pin" inputmode="numeric" placeholder="••••" onkeydown="if(event.key==='Enter') checkAuth()">
    <button class="ctrl-btn" style="width: 270px; padding: 18px;" onclick="checkAuth()">УВІЙТИ</button>
</div>

<div id="app-content" style="display: none;">
    <header>
        <div class="header-inner">
            <div>
                <div class="logo-mark">🔥 МАНГАЛ ТА ЗАГОТІВЕЛЬНИЙ</div>
                <div id="date-label" style="font-family: 'JetBrains Mono'; font-size: 8px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase;"></div>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button class="hbtn theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="hbtn" style="background: rgba(0,136,204,0.1); color: #38bdf8;" onclick="shareToTelegram()">✈️ ВІДПРАВИТИ</button>
                <button class="hbtn" id="lockBtn" onclick="toggleLock()">🔒 НОРМИ</button>
            </div>
        </div>
    </header>

    <main>
        <div class="controls-grid">
            <div class="control-card">
                <div class="control-row">
                    <select id="selCat"></select>
                    <input type="text" id="inpName" placeholder="Назва товару...">
                    <button class="ctrl-btn" onclick="addItem()">+</button>
                </div>
            </div>
            <div class="control-card">
                <div class="control-row">
                    <input type="text" id="inpCat" placeholder="НОВИЙ РОЗДІЛ...">
                    <button class="ctrl-btn" style="background: var(--text-muted)" onclick="addCategory()">OK</button>
                </div>
            </div>
        </div>
        <div id="checklist-container"></div>
    </main>
</div>

<div class="modal-overlay" id="passwordModal">
    <div class="modal-box">
        <div style="font-weight: 800; margin-bottom: 20px;">🔐 ПАРОЛЬ АДМІНІСТРАТОРА</div>
        <input type="password" id="passInput" style="width: 100%; background: var(--surface2); border: 1px solid var(--border); color: white; text-align: center; font-size: 24px; padding: 15px; border-radius: 15px; margin-bottom: 20px;" onkeydown="if(event.key==='Enter') checkPass()">
        <div style="display: flex; gap: 10px;">
            <button class="ctrl-btn" style="flex: 1;" onclick="checkPass()">ОК</button>
            <button class="hbtn" style="flex: 1;" onclick="closePass()">Х</button>
        </div>
    </div>
</div>

<script>
    const PIN = "3196";
    const DB_KEY = 'mangal'; 
    const TG_TOKEN = "7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38"; 
    const TG_CHAT_ID = "-1002336484919"; 
    const TG_THREAD_ID = 15; 

    let isUnlocked = false;
    let store = { categories: {}, items: {} };

    // Експортуємо функції в глобальну область видимості
    window.toggleTheme = () => {
        const isLight = document.body.classList.toggle('light');
        document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    };

    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
        document.addEventListener('DOMContentLoaded', () => document.getElementById('themeBtn').textContent = '☀️');
    }

    window.checkAuth = () => {
        if (document.getElementById('auth-pin').value === "2024") {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else {
            alert("Невірний PIN");
        }
    };

    window.getIsWeekend = () => [0, 5, 6].includes(new Date().getDay());

    window.addEventListener('firebase-ready', () => {
        document.getElementById('date-label').textContent = new Date().toLocaleDateString('uk-UA', { weekday: 'long', day: 'numeric', month: 'long' });
        window.fOnValue(window.fRef(window.db, DB_KEY), snap => {
            const val = snap.val() || {};
            store.categories = val.categories || {};
            store.items = val.items || {};
            render();
            updateSelect();
        });
    });

    function render() {
        const container = document.getElementById('checklist-container');
        const isWe = window.getIsWeekend();
        const catIds = Object.keys(store.categories).sort((a, b) => store.categories[a].name.localeCompare(store.categories[b].name));
        
        container.innerHTML = catIds.map(catId => {
            const items = Object.keys(store.items).filter(id => store.items[id].catId === catId).sort((a, b) => store.items[a].name.localeCompare(store.items[b].name));
            const rows = items.map(itemId => {
                const i = store.items[itemId];
                const total = (parseFloat(i.s_m) || 0) + (parseFloat(i.s_z) || 0);
                const norm = isWe ? (parseFloat(i.we) || 0) : (parseFloat(i.wd) || 0);
                const order = Math.max(0, norm - total);

                return `<tr>
                    <td><div class="item-name">${isUnlocked ? `<span onclick="deleteItem('${itemId}')" style="color:red;margin-right:12px;cursor:pointer;font-weight:800;">✕</span>` : ''}${i.name}</div></td>
                    <td><input type="number" step="0.1" value="${i.s_m || ''}" onchange="upd('${itemId}','s_m',this.value)" class="inp-stock"></td>
                    <td><input type="number" step="0.1" value="${i.s_z || ''}" onchange="upd('${itemId}','s_z',this.value)" class="inp-stock" style="background:rgba(255,255,255,0.03)"></td>
                    <td><input type="number" step="0.1" value="${i.wd || ''}" ${!isUnlocked?'readonly':''} onchange="upd('${itemId}','wd',this.value)" class="${isUnlocked?'inp-norm':'inp-norm inp-readonly'}"></td>
                    <td><input type="number" step="0.1" value="${i.we || ''}" ${!isUnlocked?'readonly':''} onchange="upd('${itemId}','we',this.value)" class="${isUnlocked?'inp-norm':'inp-norm inp-readonly'}"></td>
                    <td>${order > 0 ? `<span class="need-badge">${order.toFixed(1)}</span>` : `<div class="done-mark">✓</div>`}</td>
                </tr>`;
            }).join('');

            return `<div class="category-block">
                <div class="cat-header"><span class="cat-title">${store.categories[catId].name}</span>${isUnlocked ? `<span onclick="deleteCat('${catId}')" style="color:red;font-size:9px;cursor:pointer;font-weight:700;">ВИДАЛИТИ РОЗДІЛ</span>` : ''}</div>
                <div class="table-wrap"><table>
                    <thead><tr><th>ТОВАР</th><th>МАНГАЛ</th><th>ЗАГОТ.</th><th>БД</th><th>ВХ</th><th>ТРЕБА</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table></div>
            </div>`;
        }).join('');
    }

    window.upd = (id, f, v) => window.fSet(window.fRef(window.db, `${DB_KEY}/items/${id}/${f}`), v);
    
    window.addItem = () => {
        const name = document.getElementById('inpName').value;
        const catId = document.getElementById('selCat').value;
        if (name && catId) {
            window.fPush(window.fRef(window.db, `${DB_KEY}/items`), { name, catId, s_m: '', s_z: '', wd: 0, we: 0 });
            document.getElementById('inpName').value = '';
        }
    };

    window.addCategory = () => {
        const name = document.getElementById('inpCat').value.toUpperCase();
        if (name) { window.fPush(window.fRef(window.db, `${DB_KEY}/categories`), { name }); document.getElementById('inpCat').value = ''; }
    };

    function updateSelect() {
        const sel = document.getElementById('selCat');
        if (sel) sel.innerHTML = Object.keys(store.categories).sort((a,b) => store.categories[a].name.localeCompare(store.categories[b].name))
            .map(id => `<option value="${id}">${store.categories[id].name}</option>`).join('');
    }

    window.toggleLock = () => {
        if (isUnlocked) { isUnlocked = false; render(); document.getElementById('lockBtn').innerHTML = "🔒 НОРМИ"; }
        else { document.getElementById('passwordModal').style.display = 'flex'; document.getElementById('passInput').focus(); }
    };

    window.checkPass = () => {
        if (document.getElementById('passInput').value === PIN) { isUnlocked = true; closePass(); render(); document.getElementById('lockBtn').innerHTML = "🔓 БЛОКУВАТИ"; }
        else alert('Невірний пароль');
    };

    window.closePass = () => { document.getElementById('passwordModal').style.display = 'none'; document.getElementById('passInput').value = ''; };

    window.deleteItem = (id) => {
        if (confirm('Видалити цей товар?')) {
            window.fRemove(window.fRef(window.db, `${DB_KEY}/items/${id}`));
        }
    };

    window.deleteCat = (id) => {
        if (confirm('Видалити весь розділ та всі товари в ньому?')) {
            window.fRemove(window.fRef(window.db, `${DB_KEY}/categories/${id}`));
            Object.keys(store.items).forEach(iid => {
                if (store.items[iid].catId === id) window.fRemove(window.fRef(window.db, `${DB_KEY}/items/${iid}`));
            });
        }
    };

    window.shareToTelegram = async () => {
        let message = "🔥 *ЗАМОВЛЕННЯ: МАНГАЛ ТА ЗАГОТІВЕЛЬНИЙ*\n";
        const isWe = window.getIsWeekend();
        message += `📅 Дата: ${new Date().toLocaleDateString('uk-UA')}\n📊 Режим: *${isWe ? "ВИХІДНІ" : "БУДНІ"}*\n\n`;
        let hasOrder = false;
        
        Object.keys(store.categories).sort((a,b) => store.categories[a].name.localeCompare(store.categories[b].name)).forEach(cid => {
            let catPart = `*${store.categories[cid].name}:*\n`;
            let itemsFound = false;
            Object.keys(store.items).filter(id => store.items[id].catId === cid).forEach(iid => {
                const i = store.items[iid];
                const total = (parseFloat(i.s_m) || 0) + (parseFloat(i.s_z) || 0);
                const norm = isWe ? (parseFloat(i.we) || 0) : (parseFloat(i.wd) || 0);
                const order = Math.max(0, norm - total);
                if (order > 0) { catPart += `• ${i.name}: *${order.toFixed(1)}*\n`; itemsFound = true; hasOrder = true; }
            });
            if (itemsFound) message += catPart + "\n";
        });

        if (!hasOrder) return alert("Все в нормі!");

        try {
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, message_thread_id: TG_THREAD_ID, text: message, parse_mode: 'Markdown' })
            });
            alert("✅ Відправлено!");
        } catch(e) { alert("❌ Помилка"); }
    };
</script>
</body>
</html>
