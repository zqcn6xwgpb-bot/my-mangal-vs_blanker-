<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мангал та Заготівельний - Баранчик</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            storageBucket: "baranchik-checklist.firebasestorage.app",
            messagingSenderId: "374378353806",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fRef = ref; window.fSet = set; window.fOnValue = onValue; window.fPush = push; window.fRemove = remove;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --surface2: #18181f; --border: #252530;
            --accent: #f97316; --text: #e8e8f0; --text-dim: #5a5a70; --text-muted: #35354a;
            --green: #22c55e; --red: #ef4444; --header-bg: rgba(10,10,15,0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* ── ЕКРАН ВХОДУ ── */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; }
        .pin-display { display: flex; gap: 15px; margin: 10px 0; }
        .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); transition: 0.2s; }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        input[type="tel"]#hidden-auth-input, input[type="tel"]#hidden-admin-input { position: absolute; opacity: 0; pointer-events: none; }

        /* ── ШАПКА ── */
        header { background: var(--header-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 40; }
        .header-inner { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-mark { font-weight: 800; font-size: 14px; letter-spacing: 1px; }

        /* ── АДМІН ПАНЕЛЬ ── */
        .admin-panel { background: var(--surface); border: 1px solid var(--accent); border-radius: 20px; padding: 16px; margin-bottom: 20px; display: none; }
        .admin-title { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; font-family: 'JetBrains Mono'; }
        .admin-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .admin-panel input, .admin-panel select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 10px; flex: 1; outline: none; }

        /* ── ТАБЛИЦІ ── */
        main { max-width: 1000px; margin: 0 auto; padding: 16px; }
        .category-block { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-bottom: 16px; }
        .cat-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .cat-title { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 700; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; /* 🔥 Фіксована ширина стовпчиків */ }
        
        /* 🔥 ВИРІВНЮВАННЯ СТОВПЧИКІВ 🔥 */
        th:nth-child(1), td:nth-child(1) { width: 35%; text-align: left; padding-left: 10px; } /* Товар */
        th:nth-child(2), td:nth-child(2) { width: 15%; } /* Манг */
        th:nth-child(3), td:nth-child(3) { width: 15%; } /* Загот */
        th:nth-child(4), td:nth-child(4) { width: 10%; } /* БД */
        th:nth-child(5), td:nth-child(5) { width: 10%; } /* ВХ */
        th:nth-child(6), td:nth-child(6) { width: 15%; padding-right: 10px; } /* Треба */

        th { font-family: 'JetBrains Mono'; font-size: 8px; color: var(--text-muted); padding: 10px 4px; text-transform: uppercase; text-align: center; }
        td { padding: 8px 2px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: center; }

        /* Динамічне приховування норм */
        .hide-norms .col-norm { display: none; }
        
        /* 🔥 ВИРІВНЮВАННЯ ШИРИНИ ТАБЛИЦІ В АДМІН РЕЖИМІ 🔥 */
        .admin-view th:nth-child(1), .admin-view td:nth-child(1) { width: 30%; } /* Товар */
        .admin-view th:nth-child(2), .admin-view td:nth-child(2) { width: 12%; } /* Манг */
        .admin-view th:nth-child(3), .admin-view td:nth-child(3) { width: 12%; } /* Загот */
        .admin-view th:nth-child(4), .admin-view td:nth-child(4) { width: 12%; } /* БД */
        .admin-view th:nth-child(5), .admin-view td:nth-child(5) { width: 12%; } /* ВХ */
        .admin-view th:nth-child(6), .admin-view td:nth-child(6) { width: 12%; } /* Треба */

        /* Поля введення */
        input[type="number"] {
            width: 100%; padding: 10px 2px; text-align: center; border-radius: 10px; border: 1px solid transparent;
            background: rgba(249,115,22,0.06); color: var(--accent); font-family: 'JetBrains Mono'; font-weight: 700; outline: none;
            max-width: 60px; /* 🔥 Обмеження максимальної ширини полів ввода */
            margin: 0 auto;
            display: block;
        }
        .inp-norm { background: var(--surface2) !important; color: var(--text-dim) !important; }

        /* 🔥 ПРИХОВУЄМО СТРІЛОЧКИ (СПІНЕРИ) 🔥 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Кнопки */
        .hbtn { font-family: 'JetBrains Mono'; font-size: 9px; font-weight: 700; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .hbtn:active { transform: scale(0.95); }
        .tg-btn { background: rgba(0,136,204,0.1); color: #38bdf8; border-color: rgba(56,189,248,0.2); }
        .del-btn { background: transparent; border: none; color: var(--red); cursor: pointer; font-size: 14px; margin-right: 5px; vertical-align: middle; }

        .need-badge { background: rgba(239,68,68,0.12); color: var(--red); padding: 8px; border-radius: 10px; font-family: 'JetBrains Mono'; font-weight: 800; display: block; max-width: 60px; margin: 0 auto; text-align: center; }
        .done-mark { color: var(--green); opacity: 0.3; font-size: 14px; text-align: center; }

        /* Модальне вікно адміна */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(8px); }
        .modal-box { background: var(--surface); padding: 30px; border-radius: 24px; text-align: center; border: 1px solid var(--border); width: 280px; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e1e2a; border: 1px solid var(--accent); padding: 12px 24px; border-radius: 50px; transition: 0.3s; opacity: 0; z-index: 9999; font-size: 12px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body onclick="focusPinInput()">

<div id="auth-screen">
    <div style="font-size: 48px;">🥩</div>
    <div style="font-weight: 800; letter-spacing: 3px; font-size: 14px;">ВХІД У СИСТЕМУ</div>
    <div class="pin-display" id="auth-dots">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <input type="tel" id="hidden-auth-input" maxlength="4" autocomplete="off">
</div>

<div id="app-content" style="display:none;">
    <header>
        <div class="header-inner">
            <div class="logo-mark">🔥🥩</div>
            <div style="display:flex; gap:8px;">
                <button class="hbtn" style="color:var(--red)" onclick="clearAll()">🧹 ОЧИСТИТИ</button>
                <button class="hbtn tg-btn" onclick="shareToTelegram()">✈️ ВІДПРАВИТИ</button>
                <button class="hbtn" id="lockBtn" onclick="toggleLock()">🔒 НОРМИ</button>
            </div>
        </div>
    </header>

    <main>
        <div class="admin-panel" id="adminTools">
            <div class="admin-title">Додати товар</div>
            <div class="admin-row">
                <select id="new-item-cat"></select>
                <input type="text" id="new-item-name" placeholder="Назва...">
                <button class="hbtn" style="background:var(--accent); color:white;" onclick="addItem()">+</button>
            </div>
            <div class="admin-title">Додати папку</div>
            <div class="admin-row">
                <input type="text" id="new-cat-name" placeholder="Назва категорії...">
                <button class="hbtn" style="background:var(--accent); color:white;" onclick="addCategory()">+</button>
            </div>
        </div>
        <div id="checklist-container"></div>
    </main>
</div>

<div class="modal-overlay" id="adminModal">
    <div class="modal-box">
        <div style="margin-bottom: 15px; font-weight: 800; font-size: 12px; color: var(--accent);">🔐 АДМІНІСТРАТОР</div>
        <div class="pin-display" id="admin-dots" style="justify-content: center;">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <input type="tel" id="hidden-admin-input" maxlength="4" autocomplete="off">
        <button class="hbtn" style="margin-top:20px; width:100%" onclick="closeAdmin()">СКАСУВАТИ</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const PIN_USER = "2024";
    const PIN_ADMIN = "3196";
    const DB_PATH = 'mangal';
    
    let isUnlocked = false;
    let store = { categories: {}, items: {} };

    // --- ПАРОЛІ ТА ФОКУС ---
    function focusPinInput() {
        const authDisp = document.getElementById('auth-screen').style.display;
        const adminDisp = document.getElementById('adminModal').style.display;
        if (authDisp !== 'none') document.getElementById('hidden-auth-input').focus();
        else if (adminDisp === 'flex') document.getElementById('hidden-admin-input').focus();
    }

    function setupPinInput(type, correctPin, callback) {
        const input = document.getElementById(`hidden-${type}-input`);
        const dots = document.querySelectorAll(`#${type}-dots .pin-dot`);
        
        input.addEventListener('input', () => {
            const val = input.value;
            dots.forEach((dot, i) => dot.classList.toggle('active', i < val.length));
            
            if (val.length === 4) {
                setTimeout(() => {
                    if (val === correctPin) {
                        callback();
                    } else {
                        showToast('❌ Невірний PIN');
                        input.value = '';
                        dots.forEach(dot => dot.classList.remove('active'));
                    }
                }, 150);
            }
        });
    }

    setupPinInput('auth', PIN_USER, () => {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        render();
    });

    setupPinInput('admin', PIN_ADMIN, () => {
        isUnlocked = true;
        document.getElementById('adminTools').style.display = 'block';
        closeAdmin();
        render();
    });

    // --- FIREBASE ---
    window.addEventListener('firebase-ready', () => {
        window.fOnValue(window.fRef(window.db, DB_PATH), snap => {
            const data = snap.val() || {};
            store.categories = data.categories || {};
            store.items = data.items || {};
            if (!document.activeElement || document.activeElement.tagName !== 'INPUT') {
                render();
                updateCatSelect();
            }
        });
    });

    // --- РЕНДЕР ---
    function render() {
        const container = document.getElementById('checklist-container');
        const isWe = [0, 5, 6].includes((new Date().getDay() + 1) % 7);
        const catIds = Object.keys(store.categories).sort();

        if (catIds.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.3; font-size:12px;">Пусто. Натисніть "НОРМИ" щоб додати товари.</div>';
            return;
        }

        container.innerHTML = catIds.map(cid => {
            const items = Object.keys(store.items).filter(id => store.items[id].catId === cid);
            const rows = items.map(iid => {
                const i = store.items[iid];
                const total = (parseFloat(i.s_m) || 0) + (parseFloat(i.s_z) || 0);
                const norm = isWe ? (parseFloat(i.we) || 0) : (parseFloat(i.wd) || 0);
                const order = Math.max(0, norm - total);

                return `<tr>
                    <td>
                        ${isUnlocked ? `<button class="del-btn" onclick="removeItem('${iid}')">✕</button>` : ''}${i.name}
                    </td>
                    <td><input type="number" step="0.1" inputmode="decimal" value="${i.s_m || ''}" onfocus="this.select()" onchange="upd('${iid}','s_m',this.value)"></td>
                    <td><input type="number" step="0.1" inputmode="decimal" value="${i.s_z || ''}" onfocus="this.select()" onchange="upd('${iid}','s_z',this.value)"></td>
                    <td class="col-norm"><input type="number" step="0.1" inputmode="decimal" class="inp-norm" value="${i.wd || 0}" onchange="upd('${iid}','wd',this.value)"></td>
                    <td class="col-norm"><input type="number" step="0.1" inputmode="decimal" class="inp-norm" value="${i.we || 0}" onchange="upd('${iid}','we',this.value)"></td>
                    <td>${order > 0 ? `<span class="need-badge">${order.toFixed(1)}</span>` : `<div class="done-mark">✓</div>`}</td>
                </tr>`;
            }).join('');

            return `
            <div class="category-block">
                <div class="cat-header">
                    <span class="cat-title">${store.categories[cid].name}</span>
                    ${isUnlocked ? `<button class="hbtn" style="color:var(--red); border:none;" onclick="removeCategory('${cid}')">ВИДАЛИТИ ПАПКУ</button>` : ''}
                </div>
                <div class="table-wrap">
                    <table class="${isUnlocked ? 'admin-view' : 'hide-norms'}">
                        <thead>
                            <tr><th>ТОВАР</th><th>МАНГ</th><th>ЗАГОТ</th><th class="col-norm">БД</th><th class="col-norm">ВХ</th><th>ТРЕБА</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            </div>`;
        }).join('');
        document.getElementById('lockBtn').innerHTML = isUnlocked ? "🔓 БЛОКУВАТИ" : "🔒 НОРМИ";
    }

    // --- ДІЇ АДМІНА ---
    window.addItem = () => {
        const catId = document.getElementById('new-item-cat').value;
        const name = document.getElementById('new-item-name').value;
        if (!name || !catId) return showToast('❌ Вкажіть назву');
        window.fPush(window.fRef(window.db, `${DB_PATH}/items`), { name, catId, s_m:0, s_z:0, wd:0, we:0 });
        document.getElementById('new-item-name').value = '';
    };

    window.removeItem = (id) => { if(confirm('Видалити товар?')) window.fRemove(window.fRef(window.db, `${DB_PATH}/items/${id}`)); };

    window.addCategory = () => {
        const name = document.getElementById('new-cat-name').value;
        if (!name) return;
        window.fPush(window.fRef(window.db, `${DB_PATH}/categories`), { name });
        document.getElementById('new-cat-name').value = '';
    };

    window.removeCategory = (cid) => {
        const hasItems = Object.values(store.items).some(i => i.catId === cid);
        if (hasItems) return alert("Папка не порожня!");
        if (confirm("Видалити папку?")) window.fRemove(window.fRef(window.db, `${DB_PATH}/categories/${cid}`));
    };

    window.updateCatSelect = () => {
        const s = document.getElementById('new-item-cat');
        if(s) s.innerHTML = Object.keys(store.categories).map(cid => `<option value="${cid}">${store.categories[cid].name}</option>`).join('');
    };

    // --- ЗАГАЛЬНІ ДІЇ ---
    window.upd = (id, field, val) => {
        const v = Math.max(0, parseFloat(val) || 0);
        window.fSet(window.fRef(window.db, `${DB_PATH}/items/${id}/${field}`), v);
    };

    window.clearAll = () => {
        if (confirm("Очистити всі залишки?")) {
            Object.keys(store.items).forEach(id => {
                window.fSet(window.fRef(window.db, `${DB_PATH}/items/${id}/s_m`), 0);
                window.fSet(window.fRef(window.db, `${DB_PATH}/items/${id}/s_z`), 0);
            });
            showToast('🧹 Залишки обнулено');
        }
    };

    window.toggleLock = () => {
        if (isUnlocked) { isUnlocked = false; document.getElementById('adminTools').style.display = 'none'; render(); }
        else { document.getElementById('adminModal').style.display = 'flex'; focusPinInput(); }
    };

    window.closeAdmin = () => {
        document.getElementById('adminModal').style.display = 'none';
        document.getElementById('hidden-admin-input').value = '';
        document.querySelectorAll('#admin-dots .pin-dot').forEach(d => d.classList.remove('active'));
    };

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.className = 'show';
        setTimeout(() => t.className = '', 2500);
    }

    window.shareToTelegram = async () => {
    const TG_TOKEN = "7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38";
    const CHAT_ID = "-1002336484919";
    const THREAD_ID = 15;
    
    let message = `📝 *ЗАМОВЛЕННЯ (МАНГАЛ)*\n\n`;
    let hasOrder = false;
    const isWe = [0, 5, 6].includes((new Date().getDay() + 1) % 7);

    // Отримуємо список ID існуючих категорій
    const activeCategories = Object.keys(store.categories);

    Object.keys(store.items).forEach(id => {
        const i = store.items[id];
        
        // ПЕРЕВІРКА: чи існує категорія цього товару в базі?
        if (!activeCategories.includes(i.catId)) {
            return; // Пропускаємо товар, якщо його папка видалена
        }

        const total = (parseFloat(i.s_m) || 0) + (parseFloat(i.s_z) || 0);
        const norm = isWe ? (parseFloat(i.we) || 0) : (parseFloat(i.wd) || 0);
        const order = Math.max(0, norm - total);

        // Додаємо в список тільки якщо потрібно більше 0
        if (order > 0.01) { 
            message += `• ${i.name}: *${order.toFixed(1)}*\n`; 
            hasOrder = true; 
        }
    });

    if (!hasOrder) return showToast('✅ Замовляти нічого');

    try {
        const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                chat_id: CHAT_ID, 
                message_thread_id: THREAD_ID, 
                text: message, 
                parse_mode: 'Markdown' 
            })
        });

        if (response.ok) {
            showToast('✈️ Відправлено в Telegram');
        } else {
            showToast('❌ Помилка Telegram API');
        }
    } catch (e) { 
        showToast('❌ Помилка мережі'); 
    }
};
</script>
</body>
</html>
