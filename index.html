<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Баранчик - Checklist</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            storageBucket: "baranchik-checklist.firebasestorage.app",
            messagingSenderId: "374378353806",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fRef = ref; window.fSet = set; window.fOnValue = onValue; window.fPush = push; window.fRemove = remove;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --surface2: #18181f; --border: #252530;
            --accent: #f97316; --text: #e8e8f0; --text-dim: #5a5a70; --text-muted: #35354a;
            --green: #22c55e; --red: #ef4444; --num-bg: rgba(255,255,255,0.05);
        }

        body.light-theme {
            --bg: #f4f4f7; --surface: #ffffff; --surface2: #e8e8f2; --border: #d1d1e0;
            --text: #1a1a20; --text-dim: #666680; --text-muted: #9999af;
            --num-bg: rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; }

        /* NUMPAD ЕКРАН */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .pin-display { display: flex; gap: 20px; margin: 25px 0; }
        .pin-dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--border); transition: 0.2s; }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.2); }
        .numpad { display: grid; grid-template-columns: repeat(3, 85px); gap: 15px; }
        .num-btn { width: 85px; height: 85px; border-radius: 24px; background: var(--num-bg); border: 1px solid var(--border); color: var(--text); font-size: 32px; font-family: 'JetBrains Mono'; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .num-btn:active { background: var(--accent); color: white; transform: scale(0.9); }
        .num-btn.clear { color: var(--red); font-size: 20px; font-weight: 800; }

        /* ШАПКА (ТЕПЕР НЕ ЗАФІКСОВАНА) */
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: relative; width: 100%; z-index: 100; }
        .header-inner { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        /* ТАБЛИЦЯ */
        main { max-width: 1000px; margin: 0 auto; padding: 16px; }
        .category-block { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-bottom: 20px; }
        .cat-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); color: var(--accent); font-weight: 800; font-size: 11px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { font-family: 'JetBrains Mono'; font-size: 8px; color: var(--text-muted); padding: 10px 4px; text-transform: uppercase; }
        td { padding: 12px 2px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: center; }

        th:nth-child(1), td:nth-child(1) { width: 35%; text-align: left; padding-left: 12px; }
        th:nth-child(2), td:nth-child(2) { width: 22%; }
        th:nth-child(3), td:nth-child(3) { width: 22%; }
        th:nth-child(6), td:nth-child(6) { width: 21%; padding-right: 12px; }

        /* ПОЛЯ ВВОДУ */
        input[type=number] { 
            -moz-appearance: textfield; width: 90%; max-width: 90px; padding: 14px 0; text-align: center; 
            border-radius: 12px; border: 1px solid transparent; background: rgba(249,115,22,0.1); 
            color: var(--accent); font-family: 'JetBrains Mono'; font-weight: 700; outline: none; margin: 0 auto; display: block;
            font-size: 16px; /* Запобігає зуму на iOS */
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .inp-norm { background: var(--surface2) !important; color: var(--text-dim) !important; border: 1px solid var(--border) !important; }

        .need-badge { background: rgba(239,68,68,0.15); color: var(--red); padding: 8px; border-radius: 10px; font-family: 'JetBrains Mono'; font-weight: 800; display: block; }
        .hbtn { font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 700; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e1e2a; border: 1px solid var(--accent); padding: 12px 24px; border-radius: 50px; transition: 0.3s; opacity: 0; z-index: 10000; color: white; font-size: 12px; }
        
        .hide-norms .col-norm { display: none; }
        .admin-view th, .admin-view td { width: 15% !important; }
        .admin-view th:nth-child(1), .admin-view td:nth-child(1) { width: 25% !important; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="font-size: 60px;">🥩</div>
    <div class="pin-display" id="auth-dots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div class="numpad">
        <div class="num-btn" onclick="pressKey('auth', '1')">1</div><div class="num-btn" onclick="pressKey('auth', '2')">2</div><div class="num-btn" onclick="pressKey('auth', '3')">3</div>
        <div class="num-btn" onclick="pressKey('auth', '4')">4</div><div class="num-btn" onclick="pressKey('auth', '5')">5</div><div class="num-btn" onclick="pressKey('auth', '6')">6</div>
        <div class="num-btn" onclick="pressKey('auth', '7')">7</div><div class="num-btn" onclick="pressKey('auth', '8')">8</div><div class="num-btn" onclick="pressKey('auth', '9')">9</div>
        <div class="num-btn clear" onclick="pressKey('auth', 'C')">C</div><div class="num-btn" onclick="pressKey('auth', '0')">0</div>
    </div>
</div>

<div id="app-content" style="display:none;">
    <header>
        <div class="header-inner">
            <div style="font-weight: 800; font-size: 14px;">🥩 БАРАНЧИК</div>
            <div style="display:flex; gap:8px;">
                <button class="hbtn" onclick="toggleTheme()" id="theme-icon">🌙</button>
                <button class="hbtn" style="color:var(--red)" onclick="clearAll()">🧹</button>
                <button class="hbtn" onclick="shareToTelegram()">✈️ ВІДПРАВИТИ</button>
                <button class="hbtn" id="lockBtn" onclick="toggleLock()">🔒</button>
            </div>
        </div>
    </header>

    <main id="checklist-container"></main>
</div>

<div class="modal-overlay" id="adminModal">
    <div style="text-align: center;">
        <div style="color:var(--accent); margin-bottom:20px; font-weight:800;">ADMIN PIN</div>
        <div class="pin-display" id="admin-dots" style="justify-content:center"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
        <div class="numpad">
            <div class="num-btn" onclick="pressKey('admin', '1')">1</div><div class="num-btn" onclick="pressKey('admin', '2')">2</div><div class="num-btn" onclick="pressKey('admin', '3')">3</div>
            <div class="num-btn" onclick="pressKey('admin', '4')">4</div><div class="num-btn" onclick="pressKey('admin', '5')">5</div><div class="num-btn" onclick="pressKey('admin', '6')">6</div>
            <div class="num-btn" onclick="pressKey('admin', '7')">7</div><div class="num-btn" onclick="pressKey('admin', '8')">8</div><div class="num-btn" onclick="pressKey('admin', '9')">9</div>
            <div class="num-btn clear" onclick="pressKey('admin', 'C')">C</div><div class="num-btn" onclick="pressKey('admin', '0')">0</div>
        </div>
        <button class="hbtn" style="margin-top:20px; width:100%; padding:15px;" onclick="closeAdmin()">СКАСУВАТИ</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const PIN_USER = "2024", PIN_ADMIN = "3196", DB_PATH = 'mangal';
    let isUnlocked = false, store = { categories: {}, items: {} }, pins = { auth: "", admin: "" };

    function pressKey(t, k) {
        if (k === 'C') pins[t] = ""; else if (pins[t].length < 4) pins[t] += k;
        document.querySelectorAll(`#${t}-dots .pin-dot`).forEach((d, i) => d.classList.toggle('active', i < pins[t].length));
        if (pins[t].length === 4) {
            if (pins[t] === (t === 'auth' ? PIN_USER : PIN_ADMIN)) {
                if (t === 'auth') { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; }
                else { isUnlocked = true; closeAdmin(); }
                render();
            } else { pins[t] = ""; document.querySelectorAll(`#${t}-dots .pin-dot`).forEach(d => d.classList.remove('active')); }
        }
    }

    window.addEventListener('firebase-ready', () => {
        window.fOnValue(window.fRef(window.db, DB_PATH), snap => {
            const data = snap.val() || {};
            store.categories = data.categories || {};
            store.items = data.items || {};
            if (!document.activeElement || document.activeElement.tagName !== 'INPUT') render();
        });
    });

    function calculateOrder(iid) {
        const row = document.querySelector(`tr[data-id="${iid}"]`);
        if (!row) return;
        const sm = parseFloat(row.querySelector('.inp-sm').value) || 0;
        const sz = parseFloat(row.querySelector('.inp-sz').value) || 0;
        const isWe = [0, 5, 6].includes(new Date().getDay());
        let norm;
        if (isUnlocked) {
            norm = isWe ? (parseFloat(row.querySelector('.inp-we').value) || 0) : (parseFloat(row.querySelector('.inp-wd').value) || 0);
        } else {
            norm = parseFloat(row.getAttribute('data-norm')) || 0;
        }
        const order = Math.max(0, norm - (sm + sz));
        const resCell = row.querySelector('.res-cell');
        resCell.innerHTML = order > 0.01 ? `<span class="need-badge">${order.toFixed(1)}</span>` : `✅`;
    }

    window.upd = (iid, field, val) => {
        const v = Math.max(0, parseFloat(val) || 0);
        store.items[iid][field] = v;
        calculateOrder(iid);
        window.fSet(window.fRef(window.db, `${DB_PATH}/items/${iid}/${field}`), v);
    };

    function render() {
        const container = document.getElementById('checklist-container');
        const isWe = [0, 5, 6].includes(new Date().getDay());
        const catIds = Object.keys(store.categories).sort();

        container.innerHTML = catIds.map(cid => {
            const items = Object.keys(store.items).filter(id => store.items[id].catId === cid);
            const rows = items.map(iid => {
                const i = store.items[iid];
                const norm = isWe ? (i.we || 0) : (i.wd || 0);
                const order = Math.max(0, norm - ((i.s_m || 0) + (i.s_z || 0)));

                return `<tr data-id="${iid}" data-norm="${norm}">
                    <td>${i.name}</td>
                    <td><input type="number" inputmode="decimal" class="inp-sm" value="${i.s_m || ''}" oninput="upd('${iid}','s_m',this.value)" onclick="this.select()"></td>
                    <td><input type="number" inputmode="decimal" class="inp-sz" value="${i.s_z || ''}" oninput="upd('${iid}','s_z',this.value)" onclick="this.select()"></td>
                    <td class="col-norm"><input type="number" inputmode="decimal" class="inp-wd" value="${i.wd || 0}" oninput="upd('${iid}','wd',this.value)" onclick="this.select()"></td>
                    <td class="col-norm"><input type="number" inputmode="decimal" class="inp-we" value="${i.we || 0}" oninput="upd('${iid}','we',this.value)" onclick="this.select()"></td>
                    <td class="res-cell">${order > 0 ? `<span class="need-badge">${order.toFixed(1)}</span>` : `✅`}</td>
                </tr>`;
            }).join('');

            return `<div class="category-block">
                <div class="cat-header">${store.categories[cid].name.toUpperCase()}</div>
                <table class="${isUnlocked ? 'admin-view' : 'hide-norms'}">
                    <thead><tr><th>ТОВАР</th><th>МАНГ</th><th>ЗАГОТ</th><th class="col-norm">БД</th><th class="col-norm">ВХ</th><th>ТРЕБА</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        }).join('');
        document.getElementById('lockBtn').innerHTML = isUnlocked ? "🔓" : "🔒";
    }

    window.toggleLock = () => isUnlocked ? (isUnlocked = false, render()) : (document.getElementById('adminModal').style.display = 'flex');
    window.closeAdmin = () => { document.getElementById('adminModal').style.display = 'none'; pins.admin = ""; };
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; t.style.transform='translateX(-50%) translateY(0)'; setTimeout(()=>{t.style.opacity=0; t.style.transform='translateX(-50%) translateY(100px)';}, 2000); }

    window.clearAll = () => {
        if(confirm("Очистити залишки?")) {
            Object.keys(store.items).forEach(id => {
                window.fSet(window.fRef(window.db, `${DB_PATH}/items/${id}/s_m`), 0);
                window.fSet(window.fRef(window.db, `${DB_PATH}/items/${id}/s_z`), 0);
            });
        }
    };

    window.shareToTelegram = async () => {
        let msg = `📝 *ЗАМОВЛЕННЯ (МАНГАЛ)*\n\n`;
        const isWe = [0, 5, 6].includes(new Date().getDay());
        let has = false;
        Object.values(store.items).forEach(i => {
            const order = Math.max(0, (isWe ? i.we : i.wd) - ((i.s_m || 0) + (i.s_z || 0)));
            if (order > 0.01) { msg += `• ${i.name}: *${order.toFixed(1)}*\n`; has = true; }
        });
        if(!has) return showToast('✅ Пусто');
        await fetch(`https://api.telegram.org/bot7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38/sendMessage`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: "-1002336484919", message_thread_id: 15, text: msg, parse_mode: 'Markdown' })
        });
        showToast('✈️ ВІДПРАВЛЕНО');
    };
</script>
</body>
</html>
